name: Transfer Keystore

on:
  workflow_dispatch:

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Decode and Re-export Keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Decode original keystore
          echo "$KEYSTORE_B64" | base64 --decode > /tmp/original.keystore
          
          # Export the certificate and private key to PKCS12 with new known password
          keytool -importkeystore \
            -srckeystore /tmp/original.keystore \
            -srcstorepass "$STORE_PASS" \
            -srckeypass "$KEY_PASS" \
            -srcalias "hasahisawi-key" \
            -destkeystore /tmp/transfer.keystore \
            -deststorepass "TransferKey@2026" \
            -destkeypass "TransferKey@2026" \
            -destalias "hasahisawi" \
            -deststoretype JKS \
            -noprompt 2>&1

          # Verify the new keystore
          keytool -list -keystore /tmp/transfer.keystore \
            -storepass "TransferKey@2026" -v 2>&1 | grep -E "SHA1|Alias|Entry type"

          # Encode as base64 for easy extraction
          base64 /tmp/transfer.keystore > /tmp/transfer.b64
          
      - name: Upload Transferred Keystore
        uses: actions/upload-artifact@v4
        with:
          name: transfer-keystore
          path: /tmp/transfer.keystore
          retention-days: 1
          
      - name: Upload Base64
        uses: actions/upload-artifact@v4
        with:
          name: transfer-keystore-b64
          path: /tmp/transfer.b64
          retention-days: 1

