name: Export Keystore

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/original.keystore
          keytool -list -keystore /tmp/original.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -v 2>&1 | grep -E "SHA1|SHA256|Alias|Entry type" | head -20

      - name: Upload Keystore
        uses: actions/upload-artifact@v4
        with:
          name: original-keystore
          path: /tmp/original.keystore
          retention-days: 1

