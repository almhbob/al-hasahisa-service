name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release (AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > artifacts/hasahisawi/hasahisawi-release.keystore

      - name: Run Expo Prebuild
        working-directory: artifacts/hasahisawi
        run: |
          npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Install Android dependencies
        working-directory: artifacts/hasahisawi/android
        run: ./gradlew dependencies --quiet

      - name: Build Android AAB (Release)
        working-directory: artifacts/hasahisawi/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/artifacts/hasahisawi/hasahisawi-release.keystore" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hasahisawi-release-aab
          path: artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Upload to Google Play (Internal Track)
        if: github.ref == 'refs/heads/main'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT }}
          packageName: com.almhbob.hasahisawi
          releaseFiles: artifacts/hasahisawi/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
